# ============================================================
#  BetterPets - Configuración de Mascotas
#  Puedes cambiar nombres, descripciones, entidades y más.
# ============================================================

# Formato de nombre del ítem: &a[Niv {nivel}] {nombre}
# Los valores de las habilidades se ajustan en el código,
# pero puedes controlar si una mascota está habilitada aquí.

mascotas:

  # ----------------------------------------------------------
  hormiga:
    habilitada: true
    nombre: "Hormiga"
